<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fa8"/>
      <stop offset="100%" stop-color="#4299e1"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#sky)"/>

  <!-- Sun: gold circle, partially behind cloud -->
  <circle cx="20" cy="21" r="8" fill="#f6d860"/>

  <!-- Cloud: overlapping white circles + base rect -->
  <rect x="4" y="18" width="20" height="9" rx="4.5" fill="white"/>
  <circle cx="9"  cy="19" r="5"   fill="white"/>
  <circle cx="16" cy="15" r="6.5" fill="white"/>
  <circle cx="22" cy="18" r="4.5" fill="white"/>
</svg>
