<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fa8"/>
      <stop offset="60%" stop-color="#2e8fd4"/>
      <stop offset="100%" stop-color="#4daee8"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Sun glow layers (behind cloud) -->
  <circle cx="960" cy="430" r="220" fill="#f6d860" opacity="0.12"/>
  <circle cx="960" cy="430" r="170" fill="#f6d860" opacity="0.18"/>
  <circle cx="960" cy="430" r="120" fill="#f6d860" opacity="0.9"/>

  <!-- Cloud: base rect + bump circles -->
  <rect x="640" y="310" width="520" height="190" rx="95" fill="white"/>
  <circle cx="730"  cy="325" r="105" fill="white"/>
  <circle cx="910"  cy="280" r="135" fill="white"/>
  <circle cx="1090" cy="320" r="100" fill="white"/>

  <!-- Left: brand name -->
  <text
    x="80" y="210"
    font-family="'Fredoka One', 'Arial Black', sans-serif"
    font-size="108"
    font-weight="900"
    fill="white"
    letter-spacing="-1">Bellingham</text>

  <text
    x="80" y="325"
    font-family="'Fredoka One', 'Arial Black', sans-serif"
    font-size="108"
    font-weight="900"
    fill="#f6d860"
    letter-spacing="-1">Hosting</text>

  <!-- Divider -->
  <rect x="80" y="355" width="72" height="5" rx="2.5" fill="white" opacity="0.5"/>

  <!-- Tagline line 1 -->
  <text
    x="80" y="415"
    font-family="'Nunito', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    fill="white"
    opacity="0.92">Web Hosting &amp; Design · Ferndale, WA</text>

  <!-- Tagline line 2 -->
  <text
    x="80" y="462"
    font-family="'Nunito', Arial, sans-serif"
    font-size="30"
    fill="white"
    opacity="0.72">Local · Solar-Powered · Personal Service</text>

  <!-- URL -->
  <text
    x="80" y="560"
    font-family="'Nunito', Arial, sans-serif"
    font-size="26"
    fill="white"
    opacity="0.55">bellinghamhosting.com</text>
</svg>
